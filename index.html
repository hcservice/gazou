<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>料金表メーカー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --ui-bg: #14161c;
    --ui-panel: #1e2129;
    --ui-line: #2f333d;
    --ui-text: #e8e9ec;
    --ui-muted: #8b909b;
    --ui-accent: #4f7cff;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    background:var(--ui-bg); color:var(--ui-text); line-height:1.5; padding-bottom:90px;
  }
  .wrap { max-width:780px; margin:0 auto; padding:0 14px; }

  header { padding:22px 0 14px; text-align:center; }
  header h1 { font-size:20px; font-weight:800; letter-spacing:.04em; }
  header h1 .dot { color:var(--ui-accent); }
  header p { font-size:11px; color:var(--ui-muted); margin-top:3px; letter-spacing:.14em; }

  /* ===== Preview (output) ===== */
  .preview-shell { margin-bottom:22px; }
  .canvas {
    aspect-ratio:16/9; width:100%; border-radius:14px; overflow:hidden;
    position:relative; display:flex; align-items:center;
    box-shadow:0 8px 40px rgba(0,0,0,.5);
  }
  .canvas-inner {
    position:relative; z-index:2; width:100%; height:100%;
    display:flex; align-items:center; gap:clamp(16px,4vw,46px);
    padding:clamp(16px,3.5vw,40px);
  }
  .pimg {
    height:84%; aspect-ratio:4/5; border-radius:16px; flex-shrink:0;
    background:rgba(255,255,255,.06); overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
  }
  .pimg img { width:100%; height:100%; object-fit:cover; }
  .pimg .noimg { color:rgba(255,255,255,.3); font-size:11px; text-align:center; padding:10px; }
  .ptext { flex:1; min-width:0; color:#fff; }
  .ptext .eyebrow { font-size:clamp(13px,2.4vw,26px); font-weight:800; letter-spacing:.01em; }
  .ptext .eyebrow .sub { font-weight:400; color:rgba(255,255,255,.55); margin-left:.4em; }
  .ptext .pname {
    font-size:clamp(26px,6vw,62px); font-weight:800; line-height:1.05;
    margin:clamp(6px,1.4vw,14px) 0 clamp(14px,2.6vw,28px); word-break:break-word;
  }
  .ptext .plist { display:flex; flex-direction:column; gap:clamp(2px,.5vw,6px); }
  .ptext .prow {
    font-size:clamp(18px,4.2vw,44px); font-weight:800; line-height:1.25;
    color:rgba(255,255,255,.78); white-space:nowrap;
  }
  .ptext .prow .sep { opacity:.5; margin:0 .25em; }
  .ptext .empty { color:rgba(255,255,255,.4); font-size:14px; }

  /* ===== Theme picker ===== */
  .section-label { font-size:11px; color:var(--ui-muted); letter-spacing:.08em; font-weight:700; margin:0 2px 9px; }
  .themes {
    display:flex; gap:10px; overflow-x:auto; padding:2px 2px 8px; margin-bottom:22px;
    -webkit-overflow-scrolling:touch;
  }
  .themes::-webkit-scrollbar { height:0; }
  .theme-chip {
    flex-shrink:0; width:64px; height:42px; border-radius:10px; cursor:pointer;
    border:2px solid transparent; position:relative; overflow:hidden;
  }
  .theme-chip.active { border-color:#fff; box-shadow:0 0 0 2px var(--ui-accent); }
  .theme-chip span { position:absolute; bottom:2px; left:0; width:100%; text-align:center;
    font-size:8px; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.8); font-weight:700; }

  /* ===== Input ===== */
  .card { background:var(--ui-panel); border:1px solid var(--ui-line); border-radius:14px; padding:16px; margin-bottom:18px; }
  .card .ttl { font-size:13px; font-weight:800; margin-bottom:14px; }

  .drop {
    border:2px dashed var(--ui-line); border-radius:12px; aspect-ratio:4/3;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; background:#191c23; overflow:hidden; position:relative;
  }
  .drop .ph { color:var(--ui-muted); font-size:12px; text-align:center; }
  .drop .ph svg { width:30px; height:30px; opacity:.4; margin-bottom:6px; }
  .drop img { display:none; }
  .drop.has img { display:block; width:100%; height:100%; object-fit:cover; }
  .drop.has .ph { display:none; }

  .fld { margin-top:14px; }
  .fld label { display:block; font-size:11px; color:var(--ui-muted); margin-bottom:5px; font-weight:700; letter-spacing:.04em; }
  .inp {
    width:100%; border:1px solid var(--ui-line); border-radius:9px; padding:11px 12px;
    font-size:15px; font-family:inherit; background:#191c23; color:var(--ui-text);
  }
  .inp:focus { outline:none; border-color:var(--ui-accent); }

  .tier-row { display:flex; gap:8px; margin-bottom:8px; }
  .tier-row .inp { flex:1; }
  .tier-row .del-tier {
    width:42px; flex-shrink:0; border:1px solid var(--ui-line); border-radius:9px;
    background:#191c23; color:var(--ui-muted); font-size:16px; cursor:pointer;
  }
  .add-tier {
    width:100%; padding:9px; border:1px dashed var(--ui-line); border-radius:9px;
    background:transparent; color:var(--ui-muted); font-size:13px; font-weight:700;
    cursor:pointer; font-family:inherit; margin-top:2px;
  }

  .btn-primary {
    width:100%; margin-top:16px; background:var(--ui-accent); color:#fff; border:none;
    border-radius:10px; padding:14px; font-size:15px; font-weight:800; letter-spacing:.03em;
    cursor:pointer; font-family:inherit;
  }
  .btn-primary:active { opacity:.85; }

  /* template chips */
  .tpl-actions { display:flex; gap:8px; margin-bottom:12px; }
  .tpl-actions button {
    flex:1; padding:11px; border-radius:9px; font-size:13px; font-weight:800; cursor:pointer; font-family:inherit;
    border:1px solid var(--ui-line); background:#191c23; color:var(--ui-text);
  }
  .tpl-actions button.primary { background:var(--ui-accent); border-color:var(--ui-accent); color:#fff; }
  .tpl-list { display:flex; flex-direction:column; gap:8px; }
  .tpl-empty { color:var(--ui-muted); font-size:12px; text-align:center; padding:4px 8px; }
  .tpl-item {
    display:flex; align-items:center; gap:10px; padding:8px 10px; border:1px solid var(--ui-line);
    border-radius:10px; background:#191c23;
  }
  .tpl-swatch { width:34px; height:24px; border-radius:6px; flex-shrink:0; }
  .tpl-info { flex:1; min-width:0; }
  .tpl-name { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tpl-sub { font-size:11px; color:var(--ui-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tpl-btns { display:flex; gap:4px; flex-shrink:0; }
  .tpl-btns button {
    height:30px; padding:0 10px; border-radius:7px; border:1px solid var(--ui-line);
    background:#14161c; color:var(--ui-muted); cursor:pointer; font-size:12px; font-weight:700; font-family:inherit;
  }
  .tpl-btns button.apply { color:var(--ui-accent); border-color:var(--ui-accent); }

  .saved-empty { color:var(--ui-muted); font-size:12px; text-align:center; padding:8px; }
  .saved-item {
    display:flex; align-items:center; gap:10px; padding:8px; border:1px solid var(--ui-line);
    border-radius:10px; margin-bottom:8px; background:#191c23;
  }
  .saved-item img { width:40px; height:40px; border-radius:7px; object-fit:cover; background:#222; flex-shrink:0; }
  .saved-item .si-info { flex:1; min-width:0; }
  .saved-item .si-name { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .saved-item .si-sub { font-size:11px; color:var(--ui-muted); }
  .saved-item .si-btns { display:flex; gap:4px; }
  .saved-item button {
    width:30px; height:30px; border-radius:7px; border:1px solid var(--ui-line);
    background:#14161c; color:var(--ui-muted); cursor:pointer; font-size:13px;
  }
  .saved-item button.active { color:var(--ui-accent); border-color:var(--ui-accent); }

  .bar {
    position:fixed; bottom:0; left:0; width:100%; background:rgba(20,22,28,.94);
    backdrop-filter:blur(10px); border-top:1px solid var(--ui-line);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom)); display:flex; gap:10px; z-index:50;
  }
  .bar button { flex:1; border-radius:10px; padding:13px; font-size:14px; font-weight:800; border:none; cursor:pointer; font-family:inherit; }
  .bar .b-new { background:var(--ui-line); color:var(--ui-text); }
  .bar .b-save { background:var(--ui-accent); color:#fff; }

  .toast {
    position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(15px);
    background:#fff; color:#14161c; padding:11px 20px; border-radius:30px;
    font-size:13px; font-weight:800; opacity:0; pointer-events:none; transition:all .3s; z-index:100;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>料金表メーカー<span class="dot">.</span></h1>
    <p>PRICE LIST MAKER</p>
  </header>

  <div class="preview-shell">
    <div class="canvas" id="canvas">
      <div class="canvas-inner">
        <div class="pimg" id="pImg"><div class="noimg">画像を選択</div></div>
        <div class="ptext">
          <div class="eyebrow" id="pEyebrow" style="display:none"></div>
          <div class="pname" id="pName">商品名</div>
          <div class="plist" id="pList"><div class="empty">価格を追加してください</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="section-label">背景テーマ</div>
  <div class="themes" id="themes"></div>

  <div class="card">
    <div class="ttl">テンプレ（枠の保存）</div>
    <div class="tpl-actions">
      <button class="primary" id="saveTplBtn">＋ 今の枠をテンプレ保存</button>
    </div>
    <div class="tpl-list" id="tplList"><div class="tpl-empty">テンプレ未登録。背景テーマ・サブ見出し・価格ラベルを設定して保存できます</div></div>
  </div>

  <div class="card">
    <div class="ttl">商品情報</div>

    <div class="drop" id="drop">
      <div class="ph">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        商品画像を選択
      </div>
      <img id="preview">
    </div>
    <input type="file" id="fileInput" accept="image/*" hidden>

    <div class="fld">
      <label>サブ見出し（任意・例：JAPANESE High Quality）</label>
      <input type="text" class="inp" id="inEyebrow" placeholder="JAPANESE High Quality">
    </div>
    <div class="fld">
      <label>商品名</label>
      <input type="text" class="inp" id="inName" placeholder="Freeze">
    </div>

    <div class="fld">
      <label>価格（ラベル と 金額）</label>
      <div id="tiers"></div>
      <button class="add-tier" id="addTier">＋ 価格を追加</button>
    </div>

    <button class="btn-primary" id="addBtn">この商品を保存</button>
  </div>

  <div class="card">
    <div class="ttl">保存した商品</div>
    <div id="savedList"><div class="saved-empty">まだありません。プレビューを見ながら作成 →「保存」</div></div>
  </div>
</div>

<div class="bar">
  <button class="b-new" id="newBtn">新規入力</button>
  <button class="b-save" id="saveImgBtn">画像で保存</button>
</div>
<div class="toast" id="toast"></div>

<script>
  const THEMES = [
    { name:'Neon',   css:'radial-gradient(120% 130% at 100% 20%, #3a1d6e 0%, #1b0f3a 35%, #050208 75%), radial-gradient(80% 90% at 85% 55%, rgba(23,105,255,.33) 0%, transparent 60%)' },
    { name:'Aurora', css:'radial-gradient(110% 120% at 90% 15%, rgba(0,210,255,.27) 0%, transparent 55%), radial-gradient(120% 120% at 80% 85%, rgba(122,0,255,.33) 0%, transparent 60%), #060814' },
    { name:'Ember',  css:'radial-gradient(120% 120% at 95% 20%, #ff6a00 0%, #b21f1f 35%, #1a0805 80%)' },
    { name:'Forest', css:'radial-gradient(120% 120% at 90% 20%, #1f7a3d 0%, #0c3d22 40%, #04140b 85%)' },
    { name:'Mono',   css:'radial-gradient(120% 120% at 80% 20%, #3a3f4a 0%, #1a1d24 45%, #050608 90%)' },
    { name:'Sakura', css:'radial-gradient(120% 120% at 90% 15%, #ff9ec4 0%, #c44d7a 35%, #2a0d1c 85%)' },
    { name:'Gold',   css:'radial-gradient(120% 120% at 90% 20%, #d4a017 0%, #7a5200 40%, #1a1206 85%)' },
    { name:'Ocean',  css:'radial-gradient(120% 120% at 90% 20%, #00b4d8 0%, #023e6e 40%, #021423 85%)' },
    { name:'Light',  css:'linear-gradient(135deg, #ffffff 0%, #eef1f6 100%)', light:true },
    { name:'Cream',  css:'linear-gradient(135deg, #f6f0e4 0%, #e8ddc8 100%)', light:true },
  ];

  let currentTheme = 0;
  let currentImage = null;
  let savedItems = [];
  let activeIndex = -1;

  const $ = id => document.getElementById(id);

  const themesEl = $('themes');
  THEMES.forEach((t, i) => {
    const c = document.createElement('div');
    c.className = 'theme-chip' + (i === 0 ? ' active' : '');
    c.style.background = t.css;
    c.innerHTML = `<span>${t.name}</span>`;
    c.onclick = () => { currentTheme = i; applyTheme(); document.querySelectorAll('.theme-chip').forEach((e,j)=>e.classList.toggle('active', j===i)); };
    themesEl.appendChild(c);
  });

  function applyTheme() {
    const t = THEMES[currentTheme];
    const root = $('canvas');
    root.style.background = t.css;
    const dark = !!t.light;
    root.querySelector('.pname').style.color = dark ? '#14161c' : '#fff';
    const eb = root.querySelector('.eyebrow');
    eb.style.color = dark ? '#14161c' : '#fff';
    root.querySelectorAll('.prow').forEach(el => el.style.color = dark ? 'rgba(20,22,28,.82)' : 'rgba(255,255,255,.78)');
    const sub = root.querySelector('.eyebrow .sub');
    if (sub) sub.style.color = dark ? 'rgba(20,22,28,.5)' : 'rgba(255,255,255,.55)';
  }

  function addTierRow(label='', value='') {
    const wrap = document.createElement('div');
    wrap.className = 'tier-row';
    wrap.innerHTML = `
      <input class="inp ti-label" placeholder="100g" value="${esc(label)}">
      <input class="inp ti-value" placeholder="1350" value="${esc(value)}">
      <button class="del-tier">✕</button>`;
    wrap.querySelector('.del-tier').onclick = () => { wrap.remove(); livePreview(); };
    wrap.querySelectorAll('input').forEach(i => i.addEventListener('input', livePreview));
    $('tiers').appendChild(wrap);
    livePreview();
  }
  $('addTier').onclick = () => addTierRow();
  addTierRow(); addTierRow();

  $('drop').onclick = () => $('fileInput').click();
  $('fileInput').onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      currentImage = ev.target.result;
      $('preview').src = currentImage;
      $('drop').classList.add('has');
      livePreview();
    };
    r.readAsDataURL(f);
  };

  ['inEyebrow','inName'].forEach(id => $(id).addEventListener('input', livePreview));

  function getLiveData() {
    const tiers = [...document.querySelectorAll('#tiers .tier-row')].map(r => ({
      label: r.querySelector('.ti-label').value.trim(),
      value: r.querySelector('.ti-value').value.trim()
    })).filter(t => t.label || t.value);
    return {
      eyebrow: $('inEyebrow').value.trim(),
      name: $('inName').value.trim(),
      image: currentImage,
      tiers
    };
  }

  function livePreview() { activeIndex = -1; renderPreview(getLiveData()); }

  function renderPreview(d) {
    $('pImg').innerHTML = d.image ? `<img src="${d.image}">` : `<div class="noimg">画像を選択</div>`;
    const eb = $('pEyebrow');
    if (d.eyebrow) {
      eb.style.display = 'block';
      const parts = d.eyebrow.split(' ');
      if (parts.length > 1) {
        eb.innerHTML = `${esc(parts[0])}<span class="sub">${esc(parts.slice(1).join(' '))}</span>`;
      } else { eb.textContent = d.eyebrow; }
    } else { eb.style.display = 'none'; }
    $('pName').textContent = d.name || '商品名';
    const pl = $('pList');
    if (d.tiers.length === 0) {
      pl.innerHTML = `<div class="empty">価格を追加してください</div>`;
    } else {
      pl.innerHTML = d.tiers.map(t =>
        `<div class="prow"><span class="lbl">${esc(t.label)}</span><span class="sep">-</span><span class="val">${esc(t.value)}</span></div>`
      ).join('');
    }
    applyTheme();
  }

  $('addBtn').onclick = () => {
    const d = getLiveData();
    if (!d.name) { toast('商品名を入力してください'); return; }
    if (d.tiers.length === 0) { toast('価格を入力してください'); return; }
    savedItems.push(d);
    renderSaved();
    toast('保存しました');
  };

  $('newBtn').onclick = () => {
    $('inEyebrow').value = ''; $('inName').value = '';
    currentImage = null; $('preview').src=''; $('drop').classList.remove('has');
    $('tiers').innerHTML=''; addTierRow(); addTierRow();
    livePreview();
    window.scrollTo({top:0, behavior:'smooth'});
  };

  function renderSaved() {
    const el = $('savedList');
    if (savedItems.length === 0) {
      el.innerHTML = `<div class="saved-empty">まだありません。プレビューを見ながら作成 →「保存」</div>`;
      return;
    }
    el.innerHTML = '';
    savedItems.forEach((it, i) => {
      const row = document.createElement('div');
      row.className = 'saved-item';
      row.innerHTML = `
        ${it.image ? `<img src="${it.image}">` : `<img>`}
        <div class="si-info">
          <div class="si-name">${esc(it.name)}</div>
          <div class="si-sub">${it.tiers.length}件の価格</div>
        </div>
        <div class="si-btns">
          <button class="show ${activeIndex===i?'active':''}" title="プレビュー表示">表示</button>
          <button class="rm" title="削除">削除</button>
        </div>`;
      row.querySelector('.show').onclick = () => { activeIndex = i; renderPreview(it); renderSaved(); window.scrollTo({top:0,behavior:'smooth'}); };
      row.querySelector('.rm').onclick = () => { savedItems.splice(i,1); if(activeIndex===i){activeIndex=-1;livePreview();} renderSaved(); };
      el.appendChild(row);
    });
  }

  $('saveImgBtn').onclick = () => {
    const data = activeIndex >= 0 ? savedItems[activeIndex] : getLiveData();
    if (!data.name && data.tiers.length === 0) { toast('内容を入力してください'); return; }
    toast('画像を生成中...');
    setTimeout(() => {
      html2canvas($('canvas'), { scale:3, useCORS:true, backgroundColor:null }).then(canvas => {
        const link = document.createElement('a');
        link.download = (data.name || '料金表') + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        toast('保存しました');
      });
    }, 250);
  };

  function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  let tt;
  function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),1700); }

  /* ===== Templates (localStorage) ===== */
  const TPL_KEY = 'priceListMaker_templates_v1';
  let templates = [];

  function loadTemplates() {
    try {
      const raw = localStorage.getItem(TPL_KEY);
      templates = raw ? JSON.parse(raw) : [];
    } catch(e) { templates = []; }
  }
  function persistTemplates() {
    try { localStorage.setItem(TPL_KEY, JSON.stringify(templates)); }
    catch(e) { toast('保存に失敗しました'); }
  }

  $('saveTplBtn').onclick = () => {
    // current "frame": theme + eyebrow + price labels (values cleared)
    const labels = [...document.querySelectorAll('#tiers .tier-row')]
      .map(r => r.querySelector('.ti-label').value.trim())
      .filter(l => l);
    const eyebrow = $('inEyebrow').value.trim();
    if (!eyebrow && labels.length === 0) {
      toast('サブ見出しか価格ラベルを入力してください'); return;
    }
    const name = prompt('テンプレ名を入力（例：駄菓子グラム売り）', eyebrow || '無題テンプレ');
    if (name === null) return;
    templates.push({
      name: name.trim() || '無題テンプレ',
      theme: currentTheme,
      eyebrow,
      labels
    });
    persistTemplates();
    renderTemplates();
    toast('テンプレを保存しました');
  };

  function applyTemplate(t) {
    // theme
    currentTheme = t.theme ?? 0;
    document.querySelectorAll('.theme-chip').forEach((e,j)=>e.classList.toggle('active', j===currentTheme));
    // eyebrow
    $('inEyebrow').value = t.eyebrow || '';
    // labels -> rebuild tier rows with empty values
    $('tiers').innerHTML = '';
    if (t.labels && t.labels.length) {
      t.labels.forEach(l => addTierRow(l, ''));
    } else {
      addTierRow(); addTierRow();
    }
    livePreview();
    toast('テンプレを適用しました');
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function renderTemplates() {
    const el = $('tplList');
    if (templates.length === 0) {
      el.innerHTML = `<div class="tpl-empty">テンプレ未登録。背景テーマ・サブ見出し・価格ラベルを設定して保存できます</div>`;
      return;
    }
    el.innerHTML = '';
    templates.forEach((t, i) => {
      const row = document.createElement('div');
      row.className = 'tpl-item';
      const themeCss = (THEMES[t.theme] && THEMES[t.theme].css) || THEMES[0].css;
      const subParts = [];
      if (t.eyebrow) subParts.push(t.eyebrow);
      if (t.labels && t.labels.length) subParts.push(t.labels.join(' / '));
      row.innerHTML = `
        <div class="tpl-swatch" style="background:${themeCss}"></div>
        <div class="tpl-info">
          <div class="tpl-name">${esc(t.name)}</div>
          <div class="tpl-sub">${esc(subParts.join(' ・ ') || '枠のみ')}</div>
        </div>
        <div class="tpl-btns">
          <button class="apply">適用</button>
          <button class="del">削除</button>
        </div>`;
      row.querySelector('.apply').onclick = () => applyTemplate(t);
      row.querySelector('.del').onclick = () => {
        if (confirm(`テンプレ「${t.name}」を削除しますか？`)) {
          templates.splice(i,1); persistTemplates(); renderTemplates();
        }
      };
      el.appendChild(row);
    });
  }

  loadTemplates();
  renderTemplates();

  applyTheme();
</script>
</body>
</html>
